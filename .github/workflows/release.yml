name: release

# 触发：push 一个 tag。支持多 flavor:
#   - alpine-vX.Y.Z         → 跑 alpine-3.20/build.sh
#   - code-browser-vX.Y.Z   → 跑 code-browser/build.sh
#   - vX.Y.Z (legacy)       → 兼容旧的 alpine-only flow，等同 alpine-vX.Y.Z
#
# 手动触发 (workflow_dispatch) 留作回填或紧急修复时用，必须显式选 flavor。
#
# Runner: ubuntu-latest 自带 docker；build.sh 都是 docker-based。

on:
  push:
    tags:
      - 'alpine-v*'
      - 'code-browser-v*'
      - 'v*'           # legacy alpine
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Which flavor to build'
        required: true
        type: choice
        options:
          - alpine
          - code-browser
      version:
        description: 'Version (e.g. 0.1.0)'
        required: true

permissions:
  # 写 release 需要：upload-release-asset 走 GITHUB_TOKEN
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve flavor + version
        id: resolve
        # 把 tag 名拆成 flavor + version。
        # workflow_dispatch 路径用 inputs.flavor / inputs.version。
        # push tag 路径按前缀分流。
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            FLAVOR="${{ github.event.inputs.flavor }}"
            VERSION="${{ github.event.inputs.version }}"
            TAG=""
          else
            TAG="${GITHUB_REF#refs/tags/}"
            case "$TAG" in
              alpine-v*)
                FLAVOR="alpine"
                VERSION="${TAG#alpine-v}"
                ;;
              code-browser-v*)
                FLAVOR="code-browser"
                VERSION="${TAG#code-browser-v}"
                ;;
              v*)
                # legacy: 老的 vX.Y.Z 等同 alpine-vX.Y.Z
                FLAVOR="alpine"
                VERSION="${TAG#v}"
                ;;
              *)
                echo "unknown tag format: $TAG" >&2
                exit 1
                ;;
            esac
          fi
          echo "flavor=$FLAVOR"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          # asset 名前缀：alpine → talon-alpine-; code-browser → talon-code-browser-
          case "$FLAVOR" in
            alpine)       PREFIX="talon-alpine" ;;
            code-browser) PREFIX="talon-code-browser" ;;
          esac
          echo "asset_prefix=$PREFIX" >> "$GITHUB_OUTPUT"

      - name: Build tarball
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          case "${{ steps.resolve.outputs.flavor }}" in
            alpine)
              bash alpine-3.20/build.sh
              ;;
            code-browser)
              bash code-browser/build.sh
              ;;
          esac

      - name: Show artifacts
        run: |
          ls -la out/
          cat out/*.sha256 || true

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # 自动用 tag 名建 release
          files: |
            out/${{ steps.resolve.outputs.asset_prefix }}-${{ steps.resolve.outputs.version }}-x86_64.tar.gz
            out/${{ steps.resolve.outputs.asset_prefix }}-${{ steps.resolve.outputs.version }}-x86_64.tar.gz.sha256
          fail_on_unmatched_files: true
