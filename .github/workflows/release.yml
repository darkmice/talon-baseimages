name: release

# 触发：push 一个 vX.Y.Z 形式的 tag。
# 流程：ubuntu-latest runner 跑 build.sh（自带 docker），上传 tarball + .sha256
#       到对应的 GitHub Release。
#
# 手动触发 (workflow_dispatch) 留作回填或紧急修复时用 —— 跑相同步骤但不发 release。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  # 写 release 需要：upload-release-asset 走 GITHUB_TOKEN
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve VERSION from tag
        id: version
        # v0.1.0 → 3.20.0 不对应；VERSION 在 build.sh 里指 alpine patch (3.20.x)。
        # tag 里直接编码 alpine version：tag "v3.20.0" → VERSION=3.20.0
        # 而 release 名 "Talon baseimage v3.20.0" 是给人看的。
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VER=${TAG#v}
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Build tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: bash alpine-3.20/build.sh

      - name: Show artifacts
        run: |
          ls -la out/
          cat out/*.sha256

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # 自动用 tag 名建 release（v3.20.0 → release "v3.20.0"）
          # 不传 body，让 release notes 由 release 维护者手填或后续 PR 补
          files: |
            out/talon-alpine-${{ steps.version.outputs.version }}-x86_64.tar.gz
            out/talon-alpine-${{ steps.version.outputs.version }}-x86_64.tar.gz.sha256
          fail_on_unmatched_files: true
